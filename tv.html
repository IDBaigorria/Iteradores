<!-- TV Quiz Show - Vanilla JS Version (no React) -->
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TV Quiz Show</title>
    <style>
        body {
            margin: 0;
            background: radial-gradient(circle, #1a1a1a, #000);
            color: white;
            font-family: Arial, sans-serif;
            overflow: hidden;
        }
        #container {
            width: 100vw;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            box-sizing: border-box;
        }
        #questionBox {
            width: 90%;
            padding: 20px;
            background: rgba(0,0,0,0.4);
            border-radius: 20px;
            text-align: center;
            font-size: 2rem;
            border: 3px solid #444;
            margin-bottom: 30px;
        }
        .option {
            width: 80%;
            padding: 15px;
            background: #222;
            border: 2px solid #555;
            border-radius: 15px;
            margin: 10px 0;
            cursor: pointer;
            transition: 0.3s;
            text-align: center;
            font-size: 1.5rem;
        }
        .option:hover {
            background: #333;
            transform: scale(1.03);
        }
        #timer {
            font-size: 3rem;
            font-weight: bold;
            margin-bottom: 20px;
        }
        #winnerBox {
            margin-top: 30px;
            font-size: 2rem;
            opacity: 0;
            transition: opacity 0.6s ease-in-out;
        }
    </style>
</head>
<body>
    <div id="container">
        <div id="timer">10</div>
        <div id="questionBox">Pregunta aparecerá aquí</div>
        <div id="options"></div>
        <div id="winnerBox"></div>
    </div>

    <script>
        // Ejemplo de pregunta simulada (luego la reemplazas por WebSocket o API)
        const sampleQuestion = {
            question: "¿Cuál es la capital de Francia?",
            options: ["Madrid", "Berlín", "París", "Roma"],
            answer: "París"
        };

        const questionBox = document.getElementById("questionBox");
        const optionsBox = document.getElementById("options");
        const timerBox = document.getElementById("timer");
        const winnerBox = document.getElementById("winnerBox");

        let timeLeft = 10;
        let countdown;

        function startTimer() {
            timerBox.textContent = timeLeft;
            countdown = setInterval(() => {
                timeLeft--;
                timerBox.textContent = timeLeft;
                if (timeLeft <= 0) {
                    clearInterval(countdown);
                    showCorrectAnswer("(nadie)");
                }
            }, 1000);
        }

        function loadQuestion(q) {
            questionBox.textContent = q.question;
            optionsBox.innerHTML = "";
            winnerBox.style.opacity = 0;

            q.options.forEach(option => {
                const btn = document.createElement("div");
                btn.className = "option";
                btn.textContent = option;
                btn.onclick = () => checkAnswer(option);
                optionsBox.appendChild(btn);
            });

            timeLeft = 10;
            startTimer();
        }

        function checkAnswer(selected) {
            clearInterval(countdown);
            const correct = selected === sampleQuestion.answer;
            showCorrectAnswer(correct ? "Jugador Demo" : "(nadie)");
        }

        function showCorrectAnswer(winner) {
            winnerBox.textContent = `Ganador: ${winner}`;
            winnerBox.style.opacity = 1;
        }

        loadQuestion(sampleQuestion);
    </script>
</body>
</html>
